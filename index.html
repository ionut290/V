<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glimmer Grove - Platform 2D</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-panel" aria-labelledby="game-title">
        <p class="eyebrow">Platform 2D originale con Phaser 3</p>
        <h1 id="game-title">Glimmer Grove</h1>
        <p class="intro">
          Aiuta Nilo, una piccola lucciola guardiana, a recuperare le gocce di luce
          evitando i rovi saltellanti della radura.
        </p>
        <ul class="controls" aria-label="Comandi di gioco">
          <li><strong>← / A</strong> muovi a sinistra</li>
          <li><strong>→ / D</strong> muovi a destra</li>
          <li><strong>↑ / W / Spazio</strong> salta</li>
          <li><strong>Invio</strong> ricomincia dopo il game over</li>
        </ul>
      </section>

      <section class="game-card" aria-label="Area di gioco">
        <div id="game-container"></div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
